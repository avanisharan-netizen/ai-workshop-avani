<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>European Space Network</title>
    <meta name="description" content="Interactive map of European ground stations, launch sites and agencies" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">
        <h1>European Space Network</h1>
        <button id="theme-toggle" class="theme-toggle">Toggle Dark/Light</button>
    </header>
    <main>
        <div id="map" class="map"></div>
        <section id="agency-directory" class="agency-section">
            <div class="section-header">
                <h2>ESA Member <span>Agencies</span></h2>
                <p>National headquarters across Europe</p>
            </div>
            <div class="table-container">
                <table id="hq-table">
                    <thead>
                        <tr>
                            <th>Agency</th>
                            <th>City</th>
                            <th>Country</th>
                            <th>Headquarters Address</th>
                            <th>Coordinates</th>
                        </tr>
                    </thead>
                    <tbody id="hq-table-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="main.js"></script>
</body>
</html>
